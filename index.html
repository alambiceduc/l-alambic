<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Alambic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
:root{
  --sg:#7FA99B;--sgl:#A8C5BB;--sgp:#EAF0ED;--sgd:#4E7A6E;
  --cr:#F6F3ED;--tc:#C47A5A;--lv:#B5AAD0;--gd:#C9A24A;
  --tx:#2C3830;--tl:#6B7F78;--wh:#FFFFFF;--bd:#D5E0DB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh;}
#app{max-width:860px;margin:0 auto;padding:0 1rem 5rem;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 0 1rem;border-bottom:1px solid var(--bd);margin-bottom:1.5rem;}
.logo{display:flex;align-items:center;gap:.65rem;}
.logo-text{font-family:'Playfair Display',serif;font-style:italic;font-size:1.55rem;color:var(--sgd);letter-spacing:.06em;line-height:1;}
.logo-text sup{font-style:normal;font-size:.65em;vertical-align:super;}
.badge{display:flex;align-items:center;gap:.4rem;background:var(--wh);border:1.5px solid var(--bd);border-radius:2rem;padding:.28rem .9rem;font-size:.8rem;color:var(--tl);}
.badge strong{color:var(--sgd);}

/* STEPPER */
.stp-wrap{margin-bottom:1.7rem;}
.stp{display:flex;align-items:center;overflow-x:auto;padding-bottom:3px;}
.stp-item{display:flex;flex-direction:column;align-items:center;gap:.18rem;cursor:pointer;min-width:50px;}
.stp-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;color:var(--tl);background:var(--wh);transition:all .2s;}
.stp-dot.a{background:var(--sgd);border-color:var(--sgd);color:#fff;}
.stp-dot.d{background:var(--sgl);border-color:var(--sgl);color:#fff;}
.stp-lbl{font-size:.58rem;color:var(--tl);text-align:center;white-space:nowrap;max-width:54px;line-height:1.2;}
.stp-lbl.a{color:var(--sgd);font-weight:600;}
.stp-conn{flex:1;height:2px;background:var(--bd);min-width:14px;margin-bottom:1rem;}
.stp-conn.d{background:var(--sgl);}
.pbar{height:3px;background:var(--bd);border-radius:99px;margin-top:.6rem;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--sgd),var(--sgl));border-radius:99px;transition:width .4s;}

/* PANEL */
.pan{background:var(--wh);border:1.5px solid var(--bd);border-radius:16px;padding:1.7rem 1.9rem;animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ptit{font-size:1.1rem;font-weight:700;color:var(--sgd);margin-bottom:.3rem;display:flex;align-items:center;gap:.45rem;}
.pdesc{font-size:.84rem;color:var(--tl);line-height:1.6;margin-bottom:1.3rem;}

/* FORMS */
.frow{display:flex;gap:.9rem;flex-wrap:wrap;}
.fg{flex:1;min-width:165px;display:flex;flex-direction:column;gap:.35rem;}
.flbl{font-size:.81rem;font-weight:600;color:var(--tx);}
.finp,.fsel{height:42px;border:1.5px solid var(--bd);border-radius:10px;padding:0 .85rem;font-size:.87rem;font-family:'Outfit',sans-serif;color:var(--tx);background:var(--wh);transition:border-color .2s;width:100%;}
.finp:focus,.fsel:focus{outline:none;border-color:var(--sg);}

/* WELCOME */
.wh{text-align:center;padding:.8rem 0 1.4rem;}
.wbig{font-family:'Playfair Display',serif;font-style:italic;font-size:3rem;color:var(--sgd);letter-spacing:.07em;}
.wbig sup{font-style:normal;font-size:1.1rem;vertical-align:super;}
.wsub{font-size:.88rem;color:var(--tl);margin-top:.4rem;line-height:1.7;}
.wcards{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-top:1.4rem;}
.wcard{text-align:center;padding:.9rem .6rem;border-radius:11px;background:var(--sgp);}
.wcard-ic{font-size:1.3rem;margin-bottom:.25rem;}
.wcard-t{font-size:.76rem;font-weight:600;color:var(--sgd);}
.wcard-s{font-size:.66rem;color:var(--tl);margin-top:.12rem;line-height:1.4;}

/* DOMAIN CARDS */
.dlimit{font-size:.76rem;color:var(--tl);text-align:right;margin-bottom:.5rem;}
.dgrid{display:flex;flex-direction:column;gap:.5rem;}
.dcard{display:flex;align-items:center;gap:.75rem;border:2px solid var(--bd);border-radius:11px;padding:.7rem .95rem;cursor:pointer;transition:all .15s;background:var(--wh);}
.dcard:hover{border-color:var(--sgl);background:var(--sgp);}
.dcard.sel{border-color:var(--sgd);background:var(--sgp);}
.dcard.dis{opacity:.4;pointer-events:none;}
.dic{font-size:1.1rem;width:26px;text-align:center;}
.dlb{font-size:.86rem;font-weight:500;flex:1;}
.dchk{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dchk.c{background:var(--sgd);border-color:var(--sgd);}
.dchk.c::after{content:"✓";color:#fff;font-size:10px;font-weight:700;}

/* OBS */
.osecs{display:flex;flex-direction:column;gap:.85rem;}
.osec{border:1.5px solid var(--bd);border-radius:11px;overflow:hidden;}
.osec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem .95rem;cursor:pointer;background:var(--sgp);user-select:none;transition:background .12s;}
.osec-hdr:hover{background:#ddeee8;}
.osec-hdr-l{display:flex;align-items:center;gap:.55rem;}
.osec-tit{font-weight:600;font-size:.88rem;color:var(--sgd);}
.obadge{font-size:.68rem;border-radius:999px;padding:.08rem .45rem;background:var(--wh);border:1px solid var(--bd);color:var(--tl);}
.obadge.h{background:var(--sgd);color:#fff;border-color:var(--sgd);}
.ochev{font-size:.6rem;color:var(--tl);transition:transform .18s;}
.ochev.o{transform:rotate(180deg);}
.osec-body{border-top:1px solid var(--bd);padding:.65rem .95rem;display:flex;flex-direction:column;gap:.38rem;}
.osec-body.col{display:none;}
.oitem{display:flex;align-items:flex-start;gap:.6rem;padding:.4rem .45rem;border-radius:7px;cursor:pointer;transition:background .1s;}
.oitem:hover{background:var(--sgp);}
.oitem.ck{background:#eaf4f0;}
.ochbox{width:17px;height:17px;border:2px solid var(--bd);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .1s;}
.ochbox.ck{background:var(--sgd);border-color:var(--sgd);}
.ochbox.ck::after{content:"✓";color:#fff;font-size:10px;font-weight:700;}
.otxt{font-size:.82rem;line-height:1.55;}

/* COGNITIF */
.ctbl{width:100%;border-collapse:collapse;}
.ctbl th{font-size:.73rem;font-weight:600;color:var(--tl);padding:.45rem .65rem;text-align:left;border-bottom:2px solid var(--bd);}
.ctbl td{padding:.55rem .65rem;border-bottom:1px solid var(--sgp);vertical-align:middle;}
.ctbl tr:last-child td{border-bottom:none;}
.clb{font-size:.85rem;font-weight:500;}
.cdsc{font-size:.71rem;color:var(--tl);margin-top:.08rem;}
.cbtns{display:flex;gap:.3rem;justify-content:center;}
.cbtn{width:32px;height:32px;border-radius:7px;border:2px solid var(--bd);background:var(--wh);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .12s;}
.cbtn:hover{border-color:var(--sg);}
.cbtn.p{background:#d4edda;border-color:#5a9e6e;color:#2d6a4f;}
.cbtn.m{background:#fde8e8;border-color:#c97b7b;color:#8b2c2c;}
.cbtn.u{background:#eee8f5;border-color:#9b87c2;color:#4a3a7a;}

/* SYNTHESE */
.sblk{margin-bottom:1.3rem;}
.sblk-lbl{font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tl);margin-bottom:.6rem;}
.scrow{margin-bottom:.6rem;}
.scrow-top{display:flex;justify-content:space-between;font-size:.81rem;margin-bottom:.22rem;}
.sbg{height:7px;background:var(--bd);border-radius:99px;overflow:hidden;}
.sfg{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sgd),var(--sgl));transition:width .5s;}
.rcard{background:var(--sgp);border:1px solid var(--sgl);border-radius:10px;padding:.85rem 1rem;margin-bottom:.45rem;font-size:.83rem;line-height:1.6;}
.rcard.or{background:#fef8e8;border-color:#e0c870;}
.rcard.lv{background:#f3f0f9;border-color:var(--lv);}
.rcardtit{font-weight:600;color:var(--sgd);margin-bottom:.3rem;font-size:.84rem;}
.rcardtit.or{color:#7a5010;}
.rcardtit.lv{color:#4a3a7a;}
.s2col{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
@media(max-width:560px){.s2col,.wcards{grid-template-columns:1fr;}}
.smini{background:var(--cr);border:1px solid var(--bd);border-radius:9px;padding:.8rem;}
.sminitit{font-size:.68rem;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem;}
.tag{display:inline-block;font-size:.71rem;padding:.08rem .5rem;border-radius:999px;background:var(--sgp);border:1px solid var(--bd);color:var(--tx);margin:.1rem;}

/* AI */
.aibox{background:linear-gradient(135deg,#eef7f4,#edf2f8);border:1.5px solid var(--sgl);border-radius:12px;padding:1.1rem 1.3rem;}
.ailbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sgd);margin-bottom:.6rem;display:flex;align-items:center;gap:.35rem;}
.aitxt{font-size:.85rem;line-height:1.85;color:var(--tx);}
.aiload{display:flex;align-items:center;gap:.55rem;color:var(--tl);font-size:.83rem;}
.spin{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--sg);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ALERTS */
.alert{border-radius:9px;padding:.6rem .9rem;margin-bottom:.9rem;font-size:.81rem;border:1.5px solid;}
.al-i{background:var(--sgp);border-color:var(--sgl);color:var(--sgd);}
.al-o{background:#fef8e8;border-color:#e0c870;color:#7a5010;}

/* BUTTONS */
.brow{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.7rem;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.58rem 1.2rem;border-radius:9px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:600;transition:all .17s;}
.bpri{background:var(--sgd);color:#fff;}.bpri:hover{background:#3d6358;}.bpri:disabled{background:#b0c8c2;cursor:default;}
.bsec{background:var(--wh);color:var(--tx);border:1.5px solid var(--bd);}.bsec:hover{border-color:var(--sg);}
.bdng{background:var(--wh);color:var(--tc);border:1.5px solid #e0b0a0;}.bdng:hover{background:#fdf0ea;}

@media print{.stp-wrap,.brow,.hdr{display:none!important;}body{background:#fff;}.pan{border:none;padding:0;}}
</style>
</head>
<body>
<div id="app">

<div class="hdr">
  <div class="logo">
    <svg width="36" height="44" viewBox="0 0 44 54" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 5L17 22L5 42Q2 48 6 51Q9 54 14 54L30 54Q35 54 38 51Q42 48 39 42L27 22L27 5" stroke="#4E7A6E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="13" y1="5" x2="31" y2="5" stroke="#4E7A6E" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="30" x2="32" y2="30" stroke="#4E7A6E" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3"/>
      <circle cx="28" cy="42" r="3.5" fill="#4E7A6E"/>
      <path d="M27 5Q35 5 35 0" stroke="#4E7A6E" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="35" cy="0.5" r="2" fill="#4E7A6E"/>
    </svg>
    <div class="logo-text">L&#8217;<sup>o</sup>Alambic</div>
  </div>
  <div id="badge" class="badge" style="display:none"><strong id="badge-name"></strong>&nbsp;·&nbsp;<span id="badge-lvl"></span></div>
</div>

<div class="stp-wrap">
  <div class="stp" id="stp"></div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:12.5%"></div></div>
</div>

<div id="panel"></div>
</div>

<script>
const OD={"grouped":{"fondamentaux":{"FOND_VIE":{"label":"Conditions de vie","items":[{"code":"FOND_VIE_01","obs":"S'endort en classe ou présente des signes visibles de somnolence répétés.","besoins":["Conditions physiologiques favorables","Sécurité"]},{"code":"FOND_VIE_02","obs":"Présente des signes physiques apparents non pris en charge (caries visibles, lésions cutanées, écoulements ORL fréquents).","besoins":["Conditions physiologiques favorables","Audition fonctionnelle","Vision fonctionnelle"]},{"code":"FOND_VIE_03","obs":"Exprime avoir faim de manière répétée, montre des signes de malnutrition (pâleur, douleur abdominale, maigreur, malaise).","besoins":["Conditions physiologiques favorables","Sécurité"]},{"code":"FOND_VIE_04","obs":"Porte régulièrement des vêtements sales ou dégage des odeurs corporelles marquées.","besoins":["Conditions physiologiques favorables","Sécurité"]},{"code":"FOND_VIE_05","obs":"Retarde le moment de quitter l'école ou exprime ne pas vouloir rentrer chez lui.","besoins":["Sécurité","Conditions physiologiques favorables"]},{"code":"FOND_VIE_06","obs":"Tient des propos explicites concernant des difficultés à la maison.","besoins":["Sécurité","Conditions physiologiques favorables"]},{"code":"FOND_VIE_07","obs":"Décrit une utilisation prolongée des écrans inadaptée à son âge.","besoins":["Conditions physiologiques favorables","Attention"]},{"code":"FOND_VIE_08","obs":"Arrive fréquemment en retard ou cumule des absences répétées.","besoins":["Conditions physiologiques favorables","Sécurité"]}]},"FOND_ENT":{"label":"Audition","items":[{"code":"FOND_ENT_01","obs":"Fixe intensément la bouche de l'enseignant lors des explications.","besoins":["Audition fonctionnelle"]},{"code":"FOND_ENT_02","obs":"Se rapproche physiquement de la personne qui parle ou manifeste une meilleure compréhension lorsqu'il est placé près de l'enseignant.","besoins":["Audition fonctionnelle"]},{"code":"FOND_ENT_03","obs":"Ne réagit pas lorsqu'on l'appelle par son prénom.","besoins":["Audition fonctionnelle","Attention"]},{"code":"FOND_ENT_04","obs":"Ne manifeste aucune réaction à des bruits soudains.","besoins":["Audition fonctionnelle"]},{"code":"FOND_ENT_05","obs":"Parle souvent plus fort que les autres élèves.","besoins":["Audition fonctionnelle","Élocution fonctionnelle"]},{"code":"FOND_ENT_06","obs":"Demande fréquemment de répéter les consignes, ou dit 'quoi?' fréquemment sans difficulté apparente de compréhension.","besoins":["Audition fonctionnelle","Mémoire de travail"]},{"code":"FOND_ENT_07","obs":"N'entre pas dans l'activité lorsque la consigne est donnée uniquement à l'oral, sans appui visuel.","besoins":["Audition fonctionnelle","Attention"]},{"code":"FOND_ENT_08","obs":"Attend que les autres élèves commencent pour entrer dans l'activité (imite).","besoins":["Audition fonctionnelle","Attention"]},{"code":"FOND_ENT_09","obs":"Se montre particulièrement gêné ou distrait en environnement bruyant.","besoins":["Audition fonctionnelle","Attention"]},{"code":"FOND_ENT_10","obs":"Confond des sons proches lors d'activités orales (ex. p/b, f/v).","besoins":["Audition fonctionnelle","Élocution fonctionnelle","Familiarisation avec la langue française et mathématique"]},{"code":"FOND_ENT_11","obs":"Déforme ou altère certains sons lors de la prononciation.","besoins":["Audition fonctionnelle","Élocution fonctionnelle"]}]},"FOND_VOIR":{"label":"Vision","items":[{"code":"FOND_VOIR_01","obs":"Confond fréquemment certaines couleurs.","besoins":["Vision fonctionnelle"]},{"code":"FOND_VOIR_02","obs":"Se plaint de vision floue ou double.","besoins":["Vision fonctionnelle","Conditions physiologiques favorables"]},{"code":"FOND_VOIR_03","obs":"Se plaint fréquemment de maux de tête.","besoins":["Vision fonctionnelle","Conditions physiologiques favorables"]},{"code":"FOND_VOIR_04","obs":"Rapproche systématiquement sa feuille ou son livre de son visage pour lire ou écrire.","besoins":["Vision fonctionnelle"]},{"code":"FOND_VOIR_05","obs":"Plisse les yeux, se frotte les yeux ou penche la tête pour regarder.","besoins":["Vision fonctionnelle"]},{"code":"FOND_VOIR_06","obs":"Cherche à se rapprocher du tableau ou regarde fréquemment le cahier de son voisin pour savoir ce qu'il doit faire.","besoins":["Vision fonctionnelle","Attention"]},{"code":"FOND_VOIR_07","obs":"Se déconcentre lors des activités nécessitant une attention visuelle prolongée.","besoins":["Vision fonctionnelle","Attention"]},{"code":"FOND_VOIR_08","obs":"Saute des lignes lors de la lecture et/ou l'écriture.","besoins":["Vision fonctionnelle","Repères pour s'organiser dans l'espace"]},{"code":"FOND_VOIR_09","obs":"Suit du regard avec difficulté un doigt ou un objet qui se déplace horizontalement ou verticalement.","besoins":["Vision fonctionnelle","Développer la motricité globale"]},{"code":"FOND_VOIR_10","obs":"Se repère difficilement sur la feuille (marges, colonnes, alignements).","besoins":["Vision fonctionnelle","Repères pour s'organiser dans l'espace"]},{"code":"FOND_VOIR_11","obs":"Écrit des lettres trop grandes ou irrégulières par rapport au lignage, alors que la motricité fine est adaptée.","besoins":["Vision fonctionnelle","Repères pour s'organiser dans l'espace","Développer la motricité fine et la graphomotricité"]}]}},"cognitif":{"COG_ATT":{"label":"Attention","items":[{"code":"COG_ATT_01","obs":"Maintient son attention malgré les distractions externes (bruits, mouvements, stimulations visuelles).","besoins":["Attention","Conditions physiologiques favorables"]},{"code":"COG_ATT_02","obs":"Maintient son attention malgré les distractions internes (digressions, rêveries, pensées parasites).","besoins":["Attention","Inhibition"]},{"code":"COG_ATT_03","obs":"Maintient son attention sur une courte durée (ex. : écoute et application d'une consigne).","besoins":["Attention"]},{"code":"COG_ATT_04","obs":"Maintient son attention sur une durée prolongée, adaptée à son âge et à la tâche demandée.","besoins":["Attention","Conditions physiologiques favorables"]},{"code":"COG_ATT_05","obs":"Maintient son attention lors d'une tâche écrite, un atelier.","besoins":["Attention"]},{"code":"COG_ATT_06","obs":"Reste attentif aux échanges tout en donnant l'impression de ne pas écouter.","besoins":["Attention","Audition fonctionnelle"]}]},"COG_MEM":{"label":"Mémoire à long terme","items":[{"code":"COG_MEM_01","obs":"Mémorise et applique les procédures (ex : technique opératoire calcul).","besoins":["Mémoriser à long terme","Planification"]},{"code":"COG_MEM_02","obs":"Mémorise et restitue par cœur les poésies, les leçons.","besoins":["Mémoriser à long terme"]},{"code":"COG_MEM_03","obs":"Mémorise et restitue les schémas, les cartes, les figures géométriques.","besoins":["Mémoriser à long terme","Repères pour s'organiser dans l'espace"]},{"code":"COG_MEM_04","obs":"Mémorise et restitue du vocabulaire et des concepts nouveaux.","besoins":["Mémoriser à long terme","Familiarisation avec la langue française et mathématique"]},{"code":"COG_MEM_05","obs":"Mémorise et restitue les symboles (lettres, chiffres), l'orthographe des mots.","besoins":["Mémoriser à long terme","Familiarisation avec la langue française et mathématique"]}]},"COG_RSP":{"label":"Repères spatiaux","items":[{"code":"COG_RSP_01","obs":"Se repère dans la classe ou un environnement familier, suit un parcours connu.","besoins":["Repères pour s'organiser dans l'espace"]},{"code":"COG_RSP_02","obs":"Suit un modèle d'assemblage, de construction adaptés à son âge.","besoins":["Repères pour s'organiser dans l'espace","Développer la motricité fine et la graphomotricité"]},{"code":"COG_RSP_03","obs":"Comprend et utilise les repères spatiaux appris en classe (devant, derrière, sous…).","besoins":["Repères pour s'organiser dans l'espace"]},{"code":"COG_RSP_04","obs":"Se repère dans l'espace de la feuille, sur un quadrillage, un plan simple.","besoins":["Repères pour s'organiser dans l'espace"]},{"code":"COG_RSP_05","obs":"Différencie correctement droite/gauche.","besoins":["Repères pour s'organiser dans l'espace"]}]},"COG_RST":{"label":"Repères temporels","items":[{"code":"COG_RST_01","obs":"Se repère dans le temps (journée, semaine) selon son âge.","besoins":["Repères pour structurer le temps"]},{"code":"COG_RST_02","obs":"Comprend et utilise les repères temporels appris en classe (avant/après, hier/aujourd'hui, h/min…).","besoins":["Repères pour structurer le temps"]},{"code":"COG_RST_03","obs":"Remet dans l'ordre chronologique des images séquentielles, des photos d'événements vécus.","besoins":["Repères pour structurer le temps","Raisonnement"]}]},"COG_INH":{"label":"Inhibition","items":[{"code":"COG_INH_01","obs":"Résiste au besoin de bouger ou de manipuler des objets.","besoins":["Inhibition","Conditions physiologiques favorables"]},{"code":"COG_INH_02","obs":"Contrôle son impulsivité dans les tâches écrites ou ateliers (rapidité, erreurs d'inattention, écriture lisible).","besoins":["Inhibition","Attention"]},{"code":"COG_INH_03","obs":"Attend la fin d'une question avant de répondre et limite les prises de paroles impulsives.","besoins":["Inhibition","Développer les habiletés sociales et l'empathie"]},{"code":"COG_INH_04","obs":"Résiste aux distractions environnantes pour rester concentré.","besoins":["Inhibition","Attention"]},{"code":"COG_INH_05","obs":"Maîtrise ses réactions émotionnelles afin d'adapter son comportement au contexte.","besoins":["Inhibition","Identifier, exprimer et réguler ses émotions"]},{"code":"COG_INH_06","obs":"Réfléchit avant d'agir.","besoins":["Inhibition","Raisonnement"]},{"code":"COG_INH_07","obs":"Stoppe une activité en cours même s'il souhaite la poursuivre.","besoins":["Inhibition","Flexibilité mentale"]}]},"COG_MDT":{"label":"Mémoire de travail","items":[{"code":"COG_MDT_01","obs":"Retient une phrase courte ou une consigne simple pour agir.","besoins":["Mémoire de travail","Attention"]},{"code":"COG_MDT_02","obs":"Retient et exécute une consigne comportant plusieurs étapes (orale ou éc imer et réguler ses émotions"]},{"code":"COMP_SOC_03","obs":"Ignore les règles sociales implicites (interrompt).","besoins":["Développer les habiletés sociales et l'empathie","Inhibition"]},{"code":"COMP_SOC_04","obs":"Utilise des paroles ou gestes inappropriés sans se rendre compte de leur impact (bouscule, dires blessants…).","besoins":["Développer les habiletés sociales et l'empathie","Construire des représentations mentales et conceptualiser"]}]},"COMP_AFF":{"label":"Affectivité","items":[{"code":"COMP_AFF_01","obs":"Recherche affective importante vis-à-vis de ses pairs.","besoins":["Appartenir à un groupe, s'y sentir reconnu et accepté","Sécurité"]},{"code":"COMP_AFF_02","obs":"Se victimise ou se sent incompris.","besoins":["Appartenir à un groupe, s'y sentir reconnu et accepté","Construire la confiance et l'estime de soi"]}]}},"comp-ecole":{"COMP_ADU":{"label":"Relation à l'adulte","items":[{"code":"COMP_ADU_01","obs":"Adopte un comportement de provocation ou d'insolence vis-à-vis de l'adulte.","besoins":["Cadre clair, structurant et contenant","Identifier, exprimer et réguler ses émotions"]},{"code":"COMP_ADU_02","obs":"Adopte des comportements verbalement violents envers l'adulte.","besoins":["Cadre clair, structurant et contenant","Identifier, exprimer et réguler ses émotions","Outils et réponses adaptées pour gérer les situations de crise"]},{"code":"COMP_ADU_03","obs":"Adopte des comportements physiquement violents envers l'adulte.","besoins":["Cadre clair, structurant et contenant","Outils et réponses adaptées pour gérer les situations de crise","Sécurité"]},{"code":"COMP_ADU_04","obs":"Recherche de manière excessive l'attention ou la proximité de l'adulte.","besoins":["Sécurité","Construire la confiance et l'estime de soi"]},{"code":"COMP_ADU_05","obs":"Refuse le contact, détourne le regard, évite l'adulte.","besoins":["Sécurité","Appartenir à un groupe, s'y sentir reconnu et accepté"]}]},"COMP_REG":{"label":"Rapport aux règles","items":[{"code":"COMP_R ise et mathématique","Construire des représentations mentales et conceptualiser"]},{"code":"MAT_PRE_04","obs":"Écrit une seule lettre pour coder chaque syllabe d'un mot (piano = po).","besoins":["Familiarisation avec la langue française et mathématique","Mémoire de travail"]},{"code":"MAT_PRE_05","obs":"N'encode pas tous les sons d'un mot (piano = pano).","besoins":["Familiarisation avec la langue française et mathématique","Mémoire de travail"]},{"code":"MAT_PRE_06","obs":"Confond des phonèmes proches (ch/j, an/on…).","besoins":["Familiarisation avec la langue française et mathématique","Audition fonctionnelle"]},{"code":"MAT_PRE_07","obs":"Produit une orthographe variable d'un même mot.","besoins":["Familiarisation avec la langue française et mathématique","Mémoriser à long terme"]}]},"MAT_NOM":{"label":"Numération","items":[{"code":"MAT_NOM_01","obs":"Ne réalise pas des correspondances terme à terme.","besoins":["Familiarisation avec la langue française et mathématique","Construire des représentations mentales et conceptualiser"]},{"code":"MAT_NOM_02","obs":"Ne coordonne pas le pointage physique et la récitation de la suite numérique.","besoins":["Familiarisation avec la langue française et mathématique","Attention","Mémoire de travail"]},{"code":"MAT_NOM_03","obs":"Ne reconnaît pas de petites quantités instantanément (subitizing 3 ou 4 objets).","besoins":["Familiarisation avec la langue française et mathématique","Vision fonctionnelle"]},{"code":"MAT_NOM_04","obs":"Perd la conservation de la quantité lorsque les objets sont déplacés ou réorganisés.","besoins":["Familiarisation avec la langue française et mathématique","Construire des représentations mentales et conceptualiser"]},{"code":"MAT_NOM_05","obs":"S'organise difficilement pour dénombrer des collections selon leurs dispositions.","besoins":["Familiarisation avec la langue française et mathématique","Organisation","Attention"]},{"code":"MAT_NOM_06","obs":"Ne comprend pas que le dernier mot-nombre dit don gmentation","items":[{"code":"ELE_SEG_01","obs":"Colle la majorité des mots entre eux ou les découpe de manière excessive.","besoins":["Familiarisation avec la langue française et mathématique","Construire des représentations mentales et conceptualiser"]},{"code":"ELE_SEG_02","obs":"Transcrit les liaisons et enchaînements oraux à l'écrit (les amis = lezamis).","besoins":["Familiarisation avec la langue française et mathématique","Audition fonctionnelle"]}]},"ELE_SYN":{"label":"Syntaxe","items":[{"code":"ELE_SYN_01","obs":"Produit des phrases incomplètes ou nominales.","besoins":["Familiarisation avec la langue française et mathématique","Mémoire de travail"]},{"code":"ELE_SYN_02","obs":"Ne respecte pas la syntaxe d'une phrase simple.","besoins":["Familiarisation avec la langue française et mathématique","Mémoriser à long terme"]},{"code":"ELE_SYN_03","obs":"N'emploie pas de structures de phrases complexes (quand, parce que, qui).","besoins":["Familiarisation avec la langue française et mathématique","Mémoire de travail","Raisonnement"]},{"code":"ELE_SYN_04","obs":"Produit des phrases longues et confuses avec pas ou peu de ponctuation.","besoins":["Familiarisation avec la langue française et mathématique","Inhibition","Organisation"]}]},"ELE_COH":{"label":"Cohérence textuelle","items":[{"code":"ELE_COH_01","obs":"Ne répond pas à la consigne donnée.","besoins":["Familiarisation avec la langue française et mathématique","Attention","Planification"]},{"code":"ELE_COH_02","obs":"Écrit des phrases qui se contredisent dans un même texte.","besoins":["Familiarisation avec la langue française et mathématique","Raisonnement"]},{"code":"ELE_COH_03","obs":"Change de thème en cours de texte sans transition.","besoins":["Familiarisation avec la langue française et mathématique","Organisation","Flexibilité mentale"]},{"code":"ELE_COH_04","obs":"Enchaîne des idées sans connecteurs logiques.","besoins":["Familiarisation avec la langue française et mathématique","Organisation","Raiso // ── ALGO ──
function computeBesoins(){
  const sc={};
  // diff observables (poids fort)
  for(const code of Object.keys(ST.diffCk)){
    for(const [,subs] of Object.entries(OD.grouped)){
      for(const [,sub] of Object.entries(subs)){
        const it=sub.items.find(i=>i.code===code);
        if(it) it.besoins.forEach((b,i)=>{sc[b]=(sc[b]||0)+Math.max(3-i,1);});
      }
    }
  }
  // fond (poids modéré - juste pour info dans scoring, pas bloquant)
  for(const code of Object.keys(ST.fondCk)){
    for(const [,subs] of Object.entries(OD.grouped)){
      for(const [,sub] of Object.entries(subs)){
        const it=sub.items.find(i=>i.code===code);
        if(it) it.besoins.forEach((b,i)=>{sc[b]=(sc[b]||0)+Math.max(2-i,1);});
      }
    }
  }
  // cognitif
  for(const [c,v] of Object.entries(ST.cog)){
    if(v==='-'&&COGB[c]) sc[COGB[c]]=(sc[COGB[c]]||0)+4;
  }
  return Object.entries(sc)
    .sort((a,b)=>b[1]!==a[1]?b[1]-a[1]:(PRI[a[0]]||99)-(PRI[b[0]]||99))
    .slice(0,5);
}

// ── STEPPER ──
function rStp(){
  const el=document.getElementById('stp');
  el.innerHTML='';
  STEPS.forEach((s,i)=>{
    const it=document.createElement('div');
    it.className='stp-item';
    it.innerHTML=`<div class="stp-dot ${i===ST.step?'a':i<ST.step?'d':''}">${i<ST.step?'✓':i+1}</div><div class="stp-lbl ${i===ST.step?'a':''}">${s.l}</div>`;
    if(i<ST.step) it.onclick=()=>go(i);
    el.appendChild(it);
    if(i<STEPS.length-1){const c=document.createElement('div');c.className='stp-conn'+(i<ST.step?' d':'');el.appendChild(c);}
  });
  document.getElementById('pfill').style.width=((ST.step+1)/STEPS.length*100)+'%';
}

function go(n){ST.step=n;render();}

// ── RENDER ──
function render(){
  rStp();
  const p=document.getElementById('panel');
  p.innerHTML='';
  [S0,S1,S2,S3,S4,S5,S6,S7][ST.step](p);
  if(ST.prenom){document.getElementById('badge').style.display='flex';document.getElementById('badge-name').textContent=ST.prenom;document.getElementById('badge-lvl').textContent=ST.niveau;}
  window.scrollTo(0,0);
}

// ── HELPERS ──
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

function buildObsSec(subKey,sub,ckState){
  const card=mk('div','osec');
  const n=sub.items.filter(i=>ckState[i.code]).length;
  const isOpen=n>0;
  card.innerHTML=`<div class="osec-hdr"><div class="osec-hdr-l"><div class="osec-tit">${sub.label}</div><div class="obadge ${n>0?'h':''}">${n>0?n+' ✓':sub.items.length+' obs.'}</div></div><div class="ochev ${isOpen?'o':''}">▼</div></div><div class="osec-body ${isOpen?'':'col'}">${sub.items.map(it=>`<div class="oitem ${ckState[it.code]?'ck':''}" data-code="${it.code}"><div class="ochbox ${ckState[it.code]?'ck':''}"></div><div class="otxt">${it.obs}</div></div>`).join('')}</div>`;
  card.querySelector('.osec-hdr').onclick=()=>{card.querySelector('.osec-body').classList.toggle('col');card.querySelector('.ochev').classList.toggle('o');};
  card.querySelectorAll('.oitem').forEach(el=>{
    el.onclick=()=>{
      const code=el.dataset.code;
      if(ckState[code]){delete ckState[code];el.classList.remove('ck');el.querySelector('.ochbox').classList.remove('ck');}
      else{ckState[code]=true;el.classList.add('ck');el.querySelector('.ochbox').classList.add('ck');}
      const nc=sub.items.filter(i=>ckState[i.code]).length;
      card.querySelector('.obadge').textContent=nc>0?nc+' ✓':sub.items.length+' obs.';
      card.querySelector('.obadge').className='obadge'+(nc>0?' h':'');
    };
  });
  return card;
}

function buildDomainGrid(domains,selectedArr,maxSel,container){
  function refresh(){
    container.querySelectorAll('.dcard').forEach((c,i)=>{
      const id=domains[i].id;
      const sel=selectedArr.includes(id);
      c.className='dcard'+(sel?' sel':'')+(selectedArr.length>=maxSel&&!sel?' dis':'');
      c.querySelector('.dchk').className='dchk'+(sel?' c':'');
    });
  }
  domains.forEach(d=>{
    const card=mk('div','dcard'+(selectedArr.includes(d.id)?' sel':'')+(selectedArr.length>=maxSel&&!selectedArr.includes(d.id)?' dis':''));
    card.innerHTML=`<div class="dic">${d.icon}</div><div class="dlb">${d.label}</div><div class="dchk ${selectedArr.includes(d.id)?'c':''}"></div>`;
    card.onclick=()=>{
      if(selectedArr.includes(d.id)){selectedArr.splice(selectedArr.indexOf(d.id),1);}
      else if(selectedArr.length<maxSel){selectedArr.push(d.id);}
      refresh();
      if(container.parentElement) container.parentElement.querySelector('.dlimit').textContent=selectedArr.length+' / '+maxSel+' sélectionné(s)';
    };
    container.appendChild(card);
  });
}

function getSectionsForDomains(domIds,cycleKey){
  const sections={};
  const sectionMap=DD.map;
  domIds.forEach(domId=>{
    const subKeys=(sectionMap[domId]||{})[cycleKey]||[];
    subKeys.forEach(sk=>{
      let found=null;
      for(const [secK,subs] of Object.entries(OD.grouped)){
        if(subs[sk]){found={sec:secK,sub:subs[sk]};break;}
      }
      if(found&&!sections[sk]) sections[sk]=found.sub;
    });
  });
  return sections;
}

function getLabelFor(domId){
  const doms=DD[ST.cycle==='maternelle'?'mat':'ele'];
  return (doms.find(d=>d.id===domId)||{}).label||domId;
}

// ── S0: ACCUEIL ──

// ── S1: FONDAMENTAUX ──
function S1(p){

  h+=`<div class="osecs" id="fl"></div><div class="brow"><button class="btn bsec" id="s1p">← Retour</button><button class="btn bpri" id="s1n">Continuer →</button></div></div>`;
  p.innerHTML=h;
  const list=p.querySelector('#fl');
  for(const [k,sub] of Object.entries(fond)) list.appendChild(buildObsSec(k,sub,ST.fondCk));

  p.querySelector('#s1n').onclick=()=>go(2);
}

// ── S2: DOMAINES DIFFICULTÉS ──
function S2(p){
  const doms=DD[ST.cycle==='maternelle'?'mat':'ele'];
  p.innerHTML=`<div class="pan">
    <div class="ptit">🔴 2. Domaines de difficultés</div>
    <div class="pdesc">Sélectionnez jusqu'à <strong>3 domaines</strong> dans lesquels vous observez des difficultés chez ${ST.prenom}.</div>
    <div class="dlimit" id="dc">${ST.diffDom.length} / 3 sélectionné(s)</div>
    <div class="dgrid" id="dg"></div>
    <div class="brow"><button class="btn bsec" id="s2p">← Retour</button><button class="btn bpri" id="s2n">Continuer →</button></div>
  </div>`;
  buildDomainGrid(doms,ST.diffDom,3,p.querySelector('#dg'));
  p.querySelector('#s2p').onclick=()=>go(1);
  p.querySelector('#s2n').onclick=()=>{if(ST.diffDom.length>0)go(3);else alert('Sélectionnez au moins un domaine.');};
}

// ── S3: OBSERVABLES DIFFICULTÉS ──
function S3(p){
  const cycK=ST.cycle==='maternelle'?'mat':'ele';
  const secs=getSectionsForDomains(ST.diffDom,cycK);
  const n=Object.keys(ST.diffCk).length;
  let h=`<div class="pan"><div class="ptit">🔴 Observables — Difficultés</div><div class="pdesc">Pour chaque domaine sélectionné, cochez les comportements observés <strong>régulièrement</strong> chez ${ST.prenom}.</div>`;
  if(n>0) h+=`<div class="alert al-i">✓ ${n} observable${n>1?'s':''} coché${n>1?'s':''}.</div>`;
  h+=`<div class="osecs" id="ol"></div><div class="brow"><button class="btn bsec" id="s3p">← Retour</button><button class="btn bpri" id="s3n">Continuer →</button></div></div>`;
  p.innerHTML=h;
  const list=p.querySelector('#ol');
  for(const [k,sub] of Object.entries(secs)) list.appendChild(buildObsSec(k,sub,ST.diffCk));
  p.querySelector('#s3p').onclick=()=>go(2);
  p.querySelector('#s3n').onclick=()=>go(4);
}

// ── S4: DOMAINES POINTS D'APPUIS ──
function S4(p){
  const doms=DD[ST.cycle==='maternelle'?'mat':'ele'];
  p.innerHTML=`<div class="pan">
    <div class="ptit">🟢 3. Points d'appuis de l'élève</div>
    <div class="pdesc">Sélectionnez jusqu'à <strong>3 domaines</strong> dans lesquels ${ST.prenom} montre des points forts ou des ressources.</div>
    <div class="dlimit" id="sc">${ST.suppDom.length} / 3 sélectionné(s)</div>
    <div class="dgrid" id="sg"></div>
    <div class="brow"><button class="btn bsec" id="s4p">← Retour</button><button class="btn bpri" id="s4n">Continuer →</button></div>
  </div>`;
  buildDomainGrid(doms,ST.suppDom,3,p.querySelector('#sg'));
  p.querySelector('#s4p').onclick=()=>go(3);
  p.querySelector('#s4n').onclick=()=>go(ST.suppDom.length>0?5:6);
}

// ── S5: OBSERVABLES POINTS D'APPUIS ──
function S5(p){
  const suppData=SD[ST.cycle];
  const secs={};
  ST.suppDom.forEach(domId=>{
    if(suppData[domId]){
      secs[domId]={label:getLabelFor(domId),items:suppData[domId].map((obs,i)=>({code:'S_'+domId+'_'+i,obs}))};
    }
  });
  const n=Object.keys(ST.suppCk).length;
  let h=`<div class="pan"><div class="ptit">🟢 Observables — Points d'appuis</div><div class="pdesc">Cochez les compétences et ressources que vous observez chez ${ST.prenom}.</div>`;
  if(n>0) h+=`<div class="alert al-i">✓ ${n} observable${n>1?'s':''} coché${n>1?'s':''}.</div>`;
  h+=`<div class="osecs" id="sl"></div><div class="brow"><button class="btn bsec" id="s5p">← Retour</button><button class="btn bpri" id="s5n">Continuer →</button></div></div>`;
  p.innerHTML=h;
  const list=p.querySelector('#sl');
  for(const [k,sub] of Object.entries(secs)) list.appendChild(buildObsSec(k,sub,ST.suppCk));
  p.querySelector('#s5p').onclick=()=>go(4);
  p.querySelector('#s5n').onclick=()=>go(6);
}

// ── S6: COGNITIF ──
function S6(p){
  p.innerHTML=`<div class="pan">
    <div class="ptit">🧠 Analyse des habiletés cognitives</div>
    <div class="pdesc">Pour chaque habileté, indiquez si c'est un point fort <strong style="color:#2d6a4f">+</strong>, une difficulté <strong style="color:#8b2c2c">−</strong>, ou non observé <strong style="color:#4a3a7a">?</strong> chez ${ST.prenom}.</div>
    <div style="overflow-x:auto">
      <table class="ctbl" id="ct">
        <thead><tr><th style="min-width:160px">Habileté</th><th style="min-width:210px">Description</th><th style="min-width:110px;text-align:center">Évaluation</th></tr></thead>
        <tbody id="ctb"></tbody>
      </table>
    </div>
    <div class="brow"><button class="btn bsec" id="s6p">← Retour</button><button class="btn bpri" id="s6n">Voir la synthèse →</button></div>
  </div>`;
  const tb=p.querySelector('#ctb');
  COGS.forEach(cg=>{
    const v=ST.cog[cg.c]||null;
    const tr=mk('tr');
    tr.innerHTML=`<td><div class="clb">${cg.l}</div></td><td><div class="cdsc">${cg.d}</div></td><td><div class="cbtns"><button class="cbtn ${v==='+'?'p':''}" data-c="${cg.c}" data-v="+">+</button><button class="cbtn ${v==='-'?'m':''}" data-c="${cg.c}" data-v="−">−</button><button class="cbtn ${v==='?'?'u':''}" data-c="${cg.c}" data-v="?">?</button></div></td>`;
    tr.querySelectorAll('.cbtn').forEach(btn=>{
      btn.onclick=()=>{
        const cv=btn.dataset.v==='+' ? '+' : btn.dataset.v==='−' ? '-' : '?';
        ST.cog[cg.c]=cv;
        tr.querySelectorAll('.cbtn').forEach(b=>b.className='cbtn');
        btn.className='cbtn '+(cv==='+'?'p':cv==='-'?'m':'u');
      };
    });
    tb.appendChild(tr);
  });
  p.querySelector('#s6p').onclick=()=>go(ST.suppDom.length>0?5:4);
  p.querySelector('#s6n').onclick=()=>{ST.besoins=computeBesoins();go(7);};
}

// ── S7: SYNTHÈSE ──
function S7(p){
  const besoins=ST.besoins.length?ST.besoins:computeBesoins();
  ST.besoins=besoins;
  const fondCodes=Object.keys(ST.fondCk);
  const hasVision=fondCodes.some(c=>c.startsWith('FOND_VOIR'));
  const hasAudio=fondCodes.some(c=>c.startsWith('FOND_ENT'));
  const hasVie=fondCodes.some(c=>c.startsWith('FOND_VIE'));
  const totalDiff=Object.keys(ST.diffCk).length;
  const totalSupp=Object.keys(ST.suppCk).length;
  const cogNeg=COGS.filter(cg=>ST.cog[cg.c]==='-').map(cg=>cg.l);
  const cogPos=COGS.filter(cg=>ST.cog[cg.c]==='+').map(cg=>cg.l);

  let h=`<div class="pan">
    <div class="ptit">✨ Synthèse — ${ST.prenom} (${ST.niveau})</div>
    <div class="pdesc">Basée sur ${totalDiff} observable${totalDiff>1?'s':''} de difficultés${totalSupp>0?' et '+totalSupp+' point'+(totalSupp>1?'s':'')+' d’appuis':''} cochés.</div>`;

  // Recommandations fondamentaux (non bloquant, juste conseils)
  if(fondCodes.length>0){
    h+=`<div class="rcard or"><div class="rcardtit or">⚡ Préalables fondamentaux — Recommandations</div>`;
    if(hasVision) h+=`<div>👁️ <strong>Bilan ophtalmologique recommandé</strong> — Des signes visuels ont été observés.</div>`;
    if(hasAudio) h+=`<div>👂 <strong>Bilan ORL / audiométrique recommandé</strong> — Des signes auditifs ont été observés.</div>`;
    if(hasVie) h+=`<div>🏠 <strong>Signalement ou suivi éducatif à envisager</strong> — Des préoccupations liées aux conditions de vie ont été identifiées. Une équipe éducative (EE) ou un contact avec le RASED peut être utile.</div>`;
    h+=`</div>`;
  }

  // Besoins prioritaires
  h+=`<div class="sblk"><div class="sblk-lbl">Besoins prioritaires identifiés</div>`;
  if(besoins.length===0){
    h+=`<div style="color:var(--tl);font-size:.84rem;font-style:italic">Aucun observable coché. Revenez aux étapes précédentes.</div>`;
  } else {
    besoins.forEach(([b,sc],i)=>{
      const pct=Math.round(sc/besoins[0][1]*100);
      h+=`<div class="scrow"><div class="scrow-top"><span><strong>${i+1}.</strong> ${b}</span><span style="color:var(--tl);font-size:.73rem">${sc} pt${sc>1?'s':''}</span></div><div class="sbg"><div class="sfg" style="width:${pct}%"></div></div></div>`;
    });
  }
  h+=`</div>`;

  // Résumé observables par section
  h+=`<div class="sblk"><div class="sblk-lbl">Résumé des observations</div><div class="s2col">`;
  // Difficultés
  if(ST.diffDom.length>0){
    h+=`<div class="smini"><div class="sminitit">🔴 Difficultés (${totalDiff} obs.)</div><div>`;
    ST.diffDom.forEach(d=>h+=`<span class="tag">${getLabelFor(d)}</span>`);
    h+=`</div></div>`;
  }
  // Points d'appuis
  if(ST.suppDom.length>0){
    h+=`<div class="smini"><div class="sminitit">🟢 Points d'appuis (${totalSupp} obs.)</div><div>`;
    ST.suppDom.forEach(d=>h+=`<span class="tag">${getLabelFor(d)}</span>`);
    h+=`</div></div>`;
  }
  // Cognitif
  if(cogNeg.length>0||cogPos.length>0){
    h+=`<div class="smini"><div class="sminitit">🧠 Cognitif</div>`;
    if(cogNeg.length>0) h+=`<div style="font-size:.78rem;color:var(--tl);margin-bottom:.2rem">Difficultés : ${cogNeg.join(', ')}</div>`;
    if(cogPos.length>0) h+=`<div style="font-size:.78rem;color:var(--tl)">Points forts : ${cogPos.join(', ')}</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;

  // IA
  h+=`<div class="sblk"><div class="sblk-lbl">💡 Plan d'action — Adaptations concrètes en classe</div>
    <div class="aibox" id="aibox">
      <div class="aiload" id="aiload" style="display:none"><div class="spin"></div><span>L'IA génère les adaptations pédagogiques…</span></div>
      <div id="aitxt" class="aitxt" style="display:none"></div>
      <div id="aiph">
        <button class="btn bpri" id="aibtn" ${besoins.length===0?'disabled':''}>✨ Générer le plan d'action avec l'IA</button>
        <div style="margin-top:.5rem;font-size:.76rem;color:var(--tl)">Adaptations pédagogiques concrètes, adaptées au niveau ${ST.niveau}, basées sur les besoins identifiés.</div>
      </div>
    </div>
  </div>`;

  h+=`<div class="brow">
    <button class="btn bsec" id="s7p">← Retour</button>
    <button class="btn bsec" id="s7pr">🖨 Imprimer</button>
    <button class="btn bdng" id="s7r">↺ Nouvelle observation</button>
  </div></div>`;

  p.innerHTML=h;
  p.querySelector('#s7p').onclick=()=>go(6);
  p.querySelector('#s7pr').onclick=()=>window.print();
  p.querySelector('#s7r').onclick=()=>{
    if(!confirm('Réinitialiser ? Cette action est irréversible.')) return;
    Object.assign(ST,{step:0,prenom:'',niveau:'',cycle:'maternelle',fondCk:{},diffDom:[],diffCk:{},suppDom:[],suppCk:{},cog:{},besoins:[],aiTxt:''});
    render();
  };

  if(ST.aiTxt){
    p.querySelector('#aiph').style.display='none';
    const at=p.querySelector('#aitxt');
    at.style.display='block';
    at.innerHTML=ST.aiTxt;
  }

  const aibtn=p.querySelector('#aibtn');
  if(aibtn) aibtn.onclick=async()=>{
    p.querySelector('#aiph').style.display='none';
    p.querySelector('#aiload').style.display='flex';
    await callAI(p,besoins,cogNeg);
  };
}

// ── AI CALL ──
async function callAI(p,besoins,cogNeg){
  const top3=besoins.slice(0,3).map(([b])=>b);
  const diffObs=[];
  for(const code of Object.keys(ST.diffCk).slice(0,12)){
    for(const [,subs] of Object.entries(OD.grouped)){
      for(const [,sub] of Object.entries(subs)){
        const it=sub.items.find(i=>i.code===code);
        if(it){diffObs.push('- '+it.obs);break;}
      }
      if(diffObs.length>=(Object.keys(ST.diffCk).length>12?12:Object.keys(ST.diffCk).length)) break;
    }
  }
  const suppObs=Object.keys(ST.suppCk).slice(0,8).map(code=>{
    const dom=code.replace('S_','').split('_')[0]+'_'+code.replace('S_','').split('_')[1];
    return '';
  }).filter(Boolean);

  const nl='\n';
  const prompt=`Tu es une enseignante spécialisée coordinatrice ULIS, experte en adaptations pédagogiques inclusives et en CUA (Conception Universelle des Apprentissages).

PROFIL DE L'ÉLÈVE : ${ST.prenom}, niveau ${ST.niveau} (${ST.cycle==='maternelle'?'Maternelle':'Élémentaire'})

BESOINS PRIORITAIRES (du plus au moins prioritaire) :
${top3.map((b,i)=>`${i+1}. ${b}`).join(nl)}

OBSERVATIONS DE L'ENSEIGNANT (difficultés) :
${diffObs.join(nl)||'Non précisées'}

${cogNeg.length>0?'DIFFICULTÉS COGNITIVES IDENTIFIÉES :\n'+cogNeg.map(c=>'- '+c).join(nl):''}

${Object.keys(ST.suppCk).length>0?'POINTS D’APPUIS IDENTIFIÉS : '+ST.suppDom.map(d=>getLabelFor(d)).join(', '):''}

Génère un plan d'action structuré en 3 parties, uniquement en français :

**Besoin 1 : [nom du besoin]**
Liste de 4-5 adaptations concrètes, immédiatement réalisables en classe ordinaire (sans matériel coûteux), en lien avec la CUA. Formulations directes au présent (verbes d'action). Adaptées au niveau ${ST.niveau}.

**Besoin 2 : [nom du besoin]**
Même format.

**Besoin 3 : [nom du besoin]**
Même format.

**Recommandations éventuelles :**
Mentionner si un bilan professionnel est à envisager (orthophoniste, ergothérapeute, psychologue, neuropsychologue, ophtalmologue, ORL...) ou si une ESS / équipe éducative est conseillée. Rester factuel, non alarmiste.

Format : titres en **gras**, tirets pour les listes. Longueur : 450-550 mots.`;

  try{
    const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    let txt='';
    if(res.ok){const data=await res.json();txt=data.content?.[0]?.text||'Erreur.';}
    else txt='Erreur de connexion à l’API. Vérifiez la configuration Vercel.';
    txt=txt.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^- (.+)$/gm,'<span style="display:block;padding-left:.5rem">• $1</span>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    ST.aiTxt=txt;
    p.querySelector('#aiload').style.display='none';
    const at=p.querySelector('#aitxt');at.style.display='block';at.innerHTML=txt;
  }catch(err){
    p.querySelector('#aiload').style.display='none';
    p.querySelector('#aitxt').style.display='block';
    p.querySelector('#aitxt').textContent='Erreur : '+err.message;
  }
}

function getLabelFor(domId){
  const doms=DD[ST.cycle==='maternelle'?'mat':'ele'];
  return(doms.find(d=>d.id===domId)||{}).label||domId;
}

render();
